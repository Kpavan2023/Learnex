<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Prediction</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {background-color: #f7f7f7;}
        .form-control {border-radius: 12px;}
        .btn {border-radius: 12px;}
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Predict Student Score</h4>
                    </div>
                    <div class="card-body">
                        <form action="/predict" method="POST">
                            <div class="form-group">
                                <label for="hours_studied">Hours Studied</label>
                                <input type="number" step="0.1" class="form-control" id="hours_studied" name="hours_studied" required>
                            </div>
                            <div class="form-group">
                                <label for="attendance_percentage">Attendance Percentage</label>
                                <input type="number" step="1" class="form-control" id="attendance_percentage" name="attendance_percentage" required>
                            </div>
                            <div class="form-group">
                                <label for="previous_score">Previous Score</label>
                                <input type="number" step="1" class="form-control" id="previous_score" name="previous_score" required>
                            </div>
                            <button type="submit" class="btn btn-success btn-block">Predict Score</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
